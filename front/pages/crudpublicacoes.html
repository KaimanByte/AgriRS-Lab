<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crud Publicações - AgriRSlab</title>
  <link rel="stylesheet" href="/styles/StyleCrudPublicacoes.css" />
  <link rel="stylesheet" href="/styles/StyleHeader.css"/>
  <link rel="stylesheet" href="/styles/StyleFooterCrud.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet" />
</head>
<body>

  <script>
// PROTEÇÃO IMEDIATA - Coloque ANTES de qualquer outro script
(async function() {
    'use strict';
    
    console.log('🔒 [Proteção] Iniciando verificação...');
    
    // 1. Verifica se tem token
    const token = localStorage.getItem('token');
    
    if (!token) {
        console.log('❌ [Proteção] Sem token - redirecionando');
        window.location.replace('/login?erro=sem_token');
        // Para a execução de qualquer script
        throw new Error('Sem autenticação');
    }
    
    console.log('🔑 [Proteção] Token encontrado, verificando validade...');
    
    // 2. Verifica validade do token
    try {
        const response = await fetch('http://localhost:3030/auth/verificar', {
            method: 'GET',
            headers: { 
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        });
        
        console.log('📡 [Proteção] Status da verificação:', response.status);
        
        // Se não conseguir fazer a requisição ou retornar erro
        if (!response.ok) {
            console.log('❌ [Proteção] Resposta inválida');
            throw new Error('Token inválido');
        }
        
        const data = await response.json();
        console.log('📦 [Proteção] Dados recebidos:', data);
        
        // Verifica se o token é válido
        if (!data.valido || !data.autenticado) {
            console.log('❌ [Proteção] Token inválido ou expirado');
            throw new Error('Token inválido');
        }
        
        console.log('✅ [Proteção] Autenticação válida! Usuário:', data.usuario?.login);
        
    } catch (error) {
        console.error('❌ [Proteção] Erro na verificação:', error);
        
        // Limpa dados inválidos
        localStorage.removeItem('token');
        localStorage.removeItem('usuario');
        
        // Redireciona para login
        window.location.replace('/login?erro=token_invalido');
        
        // Para a execução
        throw new Error('Falha na autenticação');
    }
})();
</script>

<!-- Depois carregue o authGuard.js normalmente -->
<script src="/scripts/authGuard.js"></script>

  <header>
    <nav>
      <a target="_blank" title="AgriRSlab" href="/"><img src="/imagens/Header/AgriRSlab.png" id="Agriheader"></a>
      <ul id="nav-links">
        <li><a href="/admin/vagas">Vagas</a></li>
        <li><a href="/admin/noticias">Notícias</a></li>
        <li><a href="/admin/publicacoes">Publicações</a></li>
      </ul>
      <a target="_blank" title="Inpe" href="https://www.gov.br/inpe/pt-br"><img src="/imagens/Header/Inpe.png" id="Inpeheader"></a>
    </nav>
  </header>
  <button onclick="AuthGuard.logout()" id="deslogar">SAIR</button>
  <main>
    <section class="crud-publicacoes">
      <h2 id="crud-titulo">Publicações</h2>
      <div class="cinza">

      <form id="formAdd">
        <input type="text" id="titulo" placeholder="TÍTULO" required/>
        <input type="date" id="ano" placeholder="ANO" required/>
        <textarea type="text" id="descricao" placeholder="DESCRIÇÃO" required></textarea>
        <div style="display: flex; align-items: center; width: 100%;">
          <input type="text" id="imagem_url" placeholder="URL DA IMAGEM (imagem_url)" style="flex: 1;"/>
          <span onclick="document.getElementById('imagem_file').click()" style="cursor: pointer; margin-left: 10px; font-size: 20px;">📁</span>
        </div>
        <input type="file" id="imagem_file" accept="image/*" style="display: none;"/>
        <img id="preview" src="" alt="Preview da imagem" style="max-width: 200px; max-height: 200px; display: none; margin-top: 10px;"/>
        <input type="text" id="pdf_url" placeholder="URL DO PDF (pdf_url)"/>
        <input type="text" id="citacao_url" placeholder="URL DA CITAÇÃO (citacao_url)"/>
        <input type="text" id="doi_url" placeholder="URL DOI (doi_url)"/>
        <div class="button-group">
          <button type="submit" class="btn-adicionar" id="btnSubmit">Adicionar</button>
          <button type="button" class="btn-limpar" onclick="limparFormulario()">Limpar</button>
        </div>
      </form>

    </section>
    <ul id="lista"></ul>

  </main>

  <footer>
    <p>© 2025 AgriRSlab. Todos os direitos reservados.</p>
  </footer>

  <script>
const API = "http://localhost:3030/api/publicacao";
let PUBLICACOES = {};
let editandoId = null;

// Função para obter o token
function obterToken() {
  return localStorage.getItem('token');
}

// Função para obter headers com autenticação
function obterHeaders() {
  return {
    "Content-Type": "application/json",
    "Authorization": `Bearer ${obterToken()}`
  };
}

function formatDate(v) {
  const d = new Date(v);
  return isNaN(d) ? "-" : d.toLocaleString('pt-BR');
}

function renderLista() {
  const lista = document.getElementById("lista");
  lista.innerHTML = "";
  const pubs = Object.values(PUBLICACOES);
  if (pubs.length === 0) {
    lista.innerHTML = '<li class="mensagem">Nenhuma publicação cadastrada.</li>';
    return;
  }
  pubs.forEach(pub => {
    const li = document.createElement("li");
    li.innerHTML = `
      <img class="item-thumb" src="${pub.imagem_url || '/imagens/Publicacoes/pb01.png'}" alt="${pub.titulo || ''}" />
      <div class="item-text">
        <b>${pub.titulo} (${pub.ano})</b> - <span class="descricao">${pub.descricao}</span>
        <div class="item-links">
          ${pub.pdf_url ? `<a href="${pub.pdf_url}" target="_blank">PDF</a>` : ''}
          ${pub.citacao_url ? `<a href="${pub.citacao_url}" target="_blank">Citação</a>` : ''}
          ${pub.doi_url ? `<a href="${pub.doi_url}" target="_blank">DOI</a>` : ''}
        </div>
        <small class="timestamps">Criado: ${formatDate(pub.criado_em)} • Atualizado: ${formatDate(pub.atualizado_em)}</small>
      </div>
      <div class="crud-actions">
        <button id="azul" onclick="editar(${pub.idpublicacao})">Editar</button>
        <button id="vermelho" onclick="excluir(${pub.idpublicacao})">Excluir</button>
      </div>
    `;
    lista.appendChild(li);
  });
}

function carregar() {
  fetch(API)
    .then(r => r.json())
    .then(data => {
      PUBLICACOES = {};
      data.forEach(pub => PUBLICACOES[pub.idpublicacao] = pub);
      renderLista();
    })
    .catch(err => {
      console.error('Erro ao carregar publicações:', err);
      document.getElementById("lista").innerHTML = '<li class="mensagem">Erro ao carregar publicações.</li>';
    });
}

document.getElementById("formAdd").addEventListener("submit", async e => {
  e.preventDefault();
  const dados = ["titulo", "ano", "descricao", "pdf_url", "citacao_url", "doi_url"]
    .reduce((acc, id) => (acc[id] = document.getElementById(id).value, acc), {});
  dados.ano = new Date(dados.ano).getFullYear();

  const fileInput = document.getElementById("imagem_file");
  if (fileInput.files.length > 0) {
    const file = fileInput.files[0];
    const reader = new FileReader();
    reader.onload = async () => {
      dados.imagem_url = reader.result;
      await salvarPublicacao(dados);
    };
    reader.readAsDataURL(file);
  } else {
    dados.imagem_url = document.getElementById("imagem_url").value;
    await salvarPublicacao(dados);
  }
});

async function salvarPublicacao(dados) {
  try {
    const method = editandoId ? "PUT" : "POST";
    const url = editandoId ? `${API}/${editandoId}` : API;
    
    const response = await fetch(url, {
      method: method,
      headers: obterHeaders(),
      body: JSON.stringify(dados)
    });

    if (response.status === 401 || response.status === 403) {
      alert('Sessão expirada. Faça login novamente.');
      AuthGuard.logout();
      return;
    }

    if (!response.ok) {
      throw new Error('Erro ao salvar publicação');
    }

    alert(editandoId ? "Publicação atualizada com sucesso" : "Publicação adicionada com sucesso");
    limparFormulario();
    editandoId = null;
    document.getElementById("btnSubmit").textContent = "Adicionar";
    carregar();
  } catch (err) {
    alert("Erro ao salvar publicação: " + err.message);
  }
}

function editar(id) {
  const pub = PUBLICACOES[id];
  if (!pub) return;
  if (confirm("Deseja editar esta publicação?")) {
    editandoId = id;
    document.getElementById("titulo").value = pub.titulo;
    document.getElementById("ano").value = pub.ano + "-01-01";
    document.getElementById("descricao").value = pub.descricao;
    document.getElementById("imagem_url").value = pub.imagem_url;
    document.getElementById("pdf_url").value = pub.pdf_url;
    document.getElementById("citacao_url").value = pub.citacao_url;
    document.getElementById("doi_url").value = pub.doi_url;
    document.getElementById("btnSubmit").textContent = "Atualizar";
    if (pub.imagem_url) {
      const preview = document.getElementById("preview");
      preview.src = pub.imagem_url;
      preview.style.display = "block";
    }
    document.getElementById("formAdd").scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

async function excluir(id) {
  if (confirm("Confirma exclusão?")) {
    try {
      const response = await fetch(`${API}/${id}`, { 
        method: "DELETE",
        headers: { "Authorization": `Bearer ${obterToken()}` }
      });

      if (response.status === 401 || response.status === 403) {
        alert('Sessão expirada. Faça login novamente.');
        AuthGuard.logout();
        return;
      }

      if (!response.ok) {
        throw new Error('Erro ao excluir publicação');
      }

      alert("Publicação excluída com sucesso");
      carregar();
    } catch (err) {
      alert("Erro ao excluir publicação: " + err.message);
    }
  }
}

function limparFormulario() {
  document.getElementById("titulo").value = "";
  document.getElementById("ano").value = "";
  document.getElementById("descricao").value = "";
  document.getElementById("imagem_url").value = "";
  document.getElementById("pdf_url").value = "";
  document.getElementById("citacao_url").value = "";
  document.getElementById("doi_url").value = "";
  const preview = document.getElementById("preview");
  preview.src = "";
  preview.style.display = "none";
  document.getElementById("imagem_file").value = "";
  editandoId = null;
  document.getElementById("btnSubmit").textContent = "Adicionar";
}

document.getElementById("imagem_file").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(event) {
      const preview = document.getElementById("preview");
      preview.src = event.target.result;
      preview.style.display = "block";
    };
    reader.readAsDataURL(file);
  }
});

carregar();
</script>
</body>
</html>
