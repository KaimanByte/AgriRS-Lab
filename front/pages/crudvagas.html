<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crud Vagas - AgriRSlab</title>
  <link rel="stylesheet" href="/styles/StyleCrudVagas.css"/>
  <link rel="stylesheet" href="/styles/StyleHeader.css" />
  <link rel="stylesheet" href="/styles/StyleFooterCrud.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet" />
</head>
<body>

  <script>
// PROTEÇÃO IMEDIATA - Coloque ANTES de qualquer outro script
(async function() {
    'use strict';
    
    console.log('🔒 [Proteção] Iniciando verificação...');
    
    // 1. Verifica se tem token
    const token = localStorage.getItem('token');
    
    if (!token) {
        console.log('❌ [Proteção] Sem token - redirecionando');
        window.location.replace('/login?erro=sem_token');
        // Para a execução de qualquer script
        throw new Error('Sem autenticação');
    }
    
    console.log('🔑 [Proteção] Token encontrado, verificando validade...');
    
    // 2. Verifica validade do token
    try {
        const response = await fetch('http://localhost:3030/auth/verificar', {
            method: 'GET',
            headers: { 
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        });
        
        console.log('📡 [Proteção] Status da verificação:', response.status);
        
        // Se não conseguir fazer a requisição ou retornar erro
        if (!response.ok) {
            console.log('❌ [Proteção] Resposta inválida');
            throw new Error('Token inválido');
        }
        
        const data = await response.json();
        console.log('📦 [Proteção] Dados recebidos:', data);
        
        // Verifica se o token é válido
        if (!data.valido || !data.autenticado) {
            console.log('❌ [Proteção] Token inválido ou expirado');
            throw new Error('Token inválido');
        }
        
        console.log('✅ [Proteção] Autenticação válida! Usuário:', data.usuario?.login);
        
    } catch (error) {
        console.error('❌ [Proteção] Erro na verificação:', error);
        
        // Limpa dados inválidos
        localStorage.removeItem('token');
        localStorage.removeItem('usuario');
        
        // Redireciona para login
        window.location.replace('/login?erro=token_invalido');
        
        // Para a execução
        throw new Error('Falha na autenticação');
    }
})();
</script>

<!-- Depois carregue o authGuard.js normalmente -->
<script src="/scripts/authGuard.js"></script>

  <header>
    <nav>
      <a target="_blank" title="AgriRSlab" href="/"><img src="/imagens/Header/AgriRSlab.png" id="Agriheader"></a>
      <ul id="nav-links">
        <li><a href="/admin/vagas">Vagas</a></li>
        <li><a href="/admin/noticias">Notícias</a></li>
        <li><a href="/admin/publicacoes">Publicações</a></li>
      </ul>
      <a target="_blank" title="Inpe" href="https://www.gov.br/inpe/pt-br"><img src="/imagens/Header/Inpe.png" id="Inpeheader"></a>
    </nav>
  </header>
  <button onclick="AuthGuard.logout()" id="deslogar">SAIR</button>
  <div class="crud-container">
  <form class="crud-form" id="crud-form">
    <h2 class="crud-form-titulo">Vagas</h2>
      <div class="cinza">
      <input type="text" name="titulo" placeholder="TÍTULO" required />
      <input type="text" name="prazo" placeholder="PRAZO" />
      <textarea name="descricao" placeholder="DESCRIÇÃO"></textarea>
      <textarea name="requisitos" placeholder="REQUISITOS (separados por ;)"></textarea>
      <textarea name="processo_selecao" placeholder="PROCESSOS DE SELEÇÃO (separados por ;)"></textarea>
      <input type="text" name="contato" placeholder="CONTATO" />
      <div class="button-group">
        <button type="submit" class="btn-adicionar" id="btnSubmit">Adicionar</button>
        <button type="button" class="btn-limpar" onclick="limparFormulario()">Limpar</button>
      </div>
  </div>
  </form>
  
  <div class="crud-cards" id="crud-cards"></div>
  
</div>

<footer>
    <p>© 2025 AgriRSlab. Todos os direitos reservados.</p>
</footer>

<script>
  const API_URL = "http://localhost:3030/api/oportunidades";
  const form = document.getElementById("crud-form");
  const cardsContainer = document.getElementById("crud-cards");
  let editandoId = null;

  // Função para obter o token
  function obterToken() {
    return localStorage.getItem('token');
  }

  // Função para obter headers com autenticação
  function obterHeaders() {
    return {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${obterToken()}`
    };
  }

  async function carregarCards() {
    try {
      const res = await fetch(API_URL);
      const oportunidades = await res.json();
      cardsContainer.innerHTML = "";

      oportunidades.forEach(o => {
        const card = document.createElement("div");
        card.classList.add("crud-card");

        card.innerHTML = `
          <h3>${o.titulo}</h3>
          <p>${o.descricao}</p>
          ${o.requisitos ? `<h4>Requisitos:</h4><ul>${o.requisitos.split(";").map(r => `<li>${r.trim()}</li>`).join("")}</ul>` : ""}
          ${o.processo_selecao ? `<h4>Processo de Seleção:</h4><ol>${o.processo_selecao.split(";").map(p => `<li>${p.trim()}</li>`).join("")}</ol>` : ""}
          ${o.prazo ? `<p><strong>Prazo:</strong> ${o.prazo}</p>` : ""}
          <p><strong>Contato:</strong> ${o.contato || "Não informado"}</p>
          <div class="crud-actions">
            <button class="crud-edit-btn" onclick="editarCard(${o.id})">Editar</button>
            <button class="crud-delete-btn" onclick="excluirCard(${o.id})">Excluir</button>
          </div>
        `;
        cardsContainer.appendChild(card);
      });

      if (oportunidades.length === 0) {
        cardsContainer.innerHTML = "<p>Nenhuma Vaga disponível.</p>";
      }
    } catch (error) {
      cardsContainer.innerHTML = "<p>Erro ao carregar vagas.</p>";
    }
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const dados = Object.fromEntries(new FormData(form));
    const isEdit = !!editandoId;

    console.log(isEdit ? "Atualizando vaga:" : "Adicionando nova vaga:", dados);

    try {
      const options = {
        method: isEdit ? "PUT" : "POST",
        headers: obterHeaders(),
        body: JSON.stringify(dados)
      };

      const url = isEdit ? `${API_URL}/${editandoId}` : API_URL;
      const response = await fetch(url, options);

      if (response.status === 401 || response.status === 403) {
        alert('Sessão expirada. Faça login novamente.');
        AuthGuard.logout();
        return;
      }

      if (!response.ok) {
        throw new Error('Erro ao salvar vaga');
      }

      alert(isEdit ? "Vaga atualizada com sucesso" : "Vaga adicionada com sucesso");
      limparFormulario();
      editandoId = null;
      carregarCards();
    } catch (err) {
      alert("Erro ao salvar vaga: " + err.message);
    }
  });

  async function editarCard(id) {
    if (confirm("Deseja editar essa vaga?")) {
      const res = await fetch(`${API_URL}/${id}`);
      const dados = await res.json();

      for (const campo in dados) {
        if (form.elements[campo]) {
          form.elements[campo].value = dados[campo];
        }
      }

      editandoId = id;
      document.getElementById("btnSubmit").textContent = "Atualizar";
      document.getElementById("crud-form").scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  async function excluirCard(id) {
    if (confirm("Deseja excluir essa vaga?")) {
      try {
        const response = await fetch(`${API_URL}/${id}`, { 
          method: "DELETE",
          headers: obterHeaders()
        });

        if (response.status === 401 || response.status === 403) {
          alert('Sessão expirada. Faça login novamente.');
          AuthGuard.logout();
          return;
        }

        if (!response.ok) {
          throw new Error('Erro ao excluir vaga');
        }

        alert("Vaga excluída com sucesso");
        carregarCards();
      } catch (err) {
        alert("Erro ao excluir vaga: " + err.message);
      }
    }
  }

  function limparFormulario() {
    document.querySelector('input[name="titulo"]').value = "";
    document.querySelector('input[name="prazo"]').value = "";
    document.querySelector('textarea[name="descricao"]').value = "";
    document.querySelector('textarea[name="requisitos"]').value = "";
    document.querySelector('textarea[name="processo_selecao"]').value = "";
    document.querySelector('input[name="contato"]').value = "";
    editandoId = null;
    document.getElementById("btnSubmit").textContent = "Adicionar";
  }

  carregarCards();
</script>
</body>
</html>
