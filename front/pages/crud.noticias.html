<!DOCTYPE html>
<html lang="pt-br">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Crud Notícias</title>
	<link rel="stylesheet" href="../styles/StyleCrudNoticias.css">
  <link rel="stylesheet" href="../styles/StyleHeader.css"/>
  <link rel="stylesheet" href="../styles/StyleFooterCrud.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet" />
</head>
<body>

  <header>
    <nav>
      <a target="_blank" title="AgriRSlab" href="index.html"><img src="../imagens/Header/AgriRSlab.png" id="Agriheader"></a>
      <ul id="nav-links">
        <li><a href="crudvagas.html">Vagas</a></li>
        <li><a href="crud.noticias.html">Notícias</a></li>
        <li><a href="crudpublicacoes.html">Publicações</a></li>
      </ul>
      <a target="_blank" title="Inpe" href="https://www.gov.br/inpe/pt-br"><img src="../imagens/Header/Inpe.png" id="Inpeheader"></a>
    </nav>
  </header>

	<div class="container mt-4" id="crud-news">
		<form id="formNoticias">
      <h2>Notícias</h2>
      <div id="cinza">
			  <input type="hidden" id="id">
			  <div class="form-group">
				  <input type="text" class="form-control" id="titulo" placeholder="TÍTULO" required>
			  </div>
			  <div class="form-group">
				  <textarea class="form-control" id="descricao" placeholder="DESCRIÇÃO" required></textarea>
			  </div>
			  <div class="form-group">
				  <input type="date" class="form-control" id="data" required>
			  </div>
			  <div class="form-group">
				  <div style="display: flex; align-items: center;">
					  <input type="text" class="form-control" id="imagem" placeholder="URL DA IMAGEM">
					  <span onclick="document.getElementById('imagem_file').click()" style="cursor: pointer; margin-left: 10px; font-size: 20px;">📁</span>
				  </div>
				  <input type="file" id="imagem_file" accept="image/*" style="display: none;"/>
				  <img id="preview" src="" alt="Preview da imagem" style="max-width: 200px; max-height: 200px; display: none; margin-top: 10px;"/>
			  </div>
			  <div class="form-group">
				  <input type="text" class="form-control" id="url_leiamais" placeholder="URL PARA NOTICIA INTEIRA">
			  </div>
			  <button type="submit" class="btn btn-primary btn-adicionar" id="btnSubmit">Adicionar</button>
			  <button type="button" class="btn-limpar" onclick="limparFormulario()">Limpar</button>
		  </div>
  </form>
    

		<div id="table-container">
			<table class="table mt-4">
				<thead>
					<tr>
						<th>Imagem</th>
						<th>ID</th>
						<th>Título</th>
						<th>Ações</th>
					</tr>
				</thead>
				<tbody id="tbodyNoticias"></tbody>
			</table>
		</div>
		<div id="error-message" style="display: none; color: red; font-weight: bold;"></div>
	</div>
  <footer>
    <p>© 2025 AgriRSlab. Todos os direitos reservados.</p>
  </footer>

	<script>
    const API = 'http://localhost:3030/noticias';
    let NOTICIAS = {};
    let editandoId = null;

    function formatDate(v) {
      if (!v) return '-';
      const d = new Date(v);
      return isNaN(d) ? v : d.toLocaleDateString('pt-BR');
    }

    function renderLista() {
      const tbody = document.getElementById('tbodyNoticias');
      tbody.innerHTML = '';
      const items = Object.values(NOTICIAS);
      if (items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">Nenhuma notícia disponível.</td></tr>';
      } else {
        items.forEach(n => {
          tbody.innerHTML += `
            <tr>
              <td>
                <img class="item-thumb"
                     src="${n.imagem || '../imagens/Noticias/headerNoticia.jpg'}"
                     alt="${n.titulo || ''}"
                     style="width: 50px; height: 50px; object-fit: cover; border-radius: 4px;"
                />
              </td>
              <td>${n.id}</td>
              <td>
                <div style="max-width: 300px; overflow: hidden; text-overflow: ellipsis;">
                  <b>${n.titulo || ''} (${formatDate(n.data)})</b>
                  <div style="font-size: 0.9em; color: #666; white-space: nowrap;">${n.descricao || ''}</div>
                </div>
              </td>
              <td>
                <button class="btn btn-sm btn-info" onclick="editar(${n.id})">Editar</button>
                <button class="btn btn-sm btn-danger" onclick="excluir(${n.id})">Excluir</button>
              </td>
            </tr>
          `;
        });
      }
    }

    async function carregar() {
      try {
        const res = await fetch(API);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        console.log('Dados carregados:', data); // debug
        NOTICIAS = {};
        (Array.isArray(data) ? data : []).forEach(n => {
          const key = n.id;
          if (key) NOTICIAS[key] = {
            id: key,
            titulo: n.titulo || '',
            descricao: n.descricao || '',
            data: n.data || null,
            imagem: n.imagem || '',
            url_leiamais: n.url_leiamais || ''
          };
        });
        renderLista();
      } catch (e) {
        console.error('Erro ao carregar notícias:', e);
        document.getElementById('tbodyNoticias').innerHTML = 'Erro ao carregar notícias.';
      }
    }

    document.getElementById('formNoticias').addEventListener('submit', async (e) => {
      e.preventDefault();
      const dados = {
        titulo: document.getElementById('titulo').value,
        descricao: document.getElementById('descricao').value,
        data: document.getElementById('data').value,
        url_leiamais: document.getElementById('url_leiamais').value
      };

      const fileInput = document.getElementById('imagem_file');
      if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.onload = async () => {
          dados.imagem = reader.result; // base64
          try {
            const id = document.getElementById('id').value;
            if (id) {
              const res = await fetch(`${API}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                body: JSON.stringify(dados)
              });
              if (!res.ok) throw new Error('Erro ao atualizar: ' + res.status);
          } else {
            const res = await fetch(API, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
              body: JSON.stringify(dados)
            });
              if (!res.ok) {
                const txt = await res.text();
                throw new Error('Erro ao inserir: ' + res.status + ' ' + txt);
              }
            }
            limparFormulario();
            await carregar();
            alert(editandoId ? 'Notícia atualizada com sucesso' : 'Notícia adicionada com sucesso');
          } catch (err) {
            console.error('Erro ao salvar notícia:', err);
            alert('Erro ao salvar notícia: ' + (err.message || err));
          }
        };
        reader.readAsDataURL(file);
      } else {
        dados.imagem = document.getElementById('imagem').value;
        try {
          const id = document.getElementById('id').value;
          if (id) {
            const res = await fetch(`${API}/${id}`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
              body: JSON.stringify(dados)
            });
            if (!res.ok) throw new Error('Erro ao atualizar: ' + res.status);
          } else {
            const res = await fetch(API, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
              body: JSON.stringify(dados)
            });
            if (!res.ok) {
              const txt = await res.text();
              throw new Error('Erro ao inserir: ' + res.status + ' ' + txt);
            }
          }
          limparFormulario();
          await carregar();
          alert(editandoId ? 'Notícia atualizada com sucesso' : 'Notícia adicionada com sucesso');
        } catch (err) {
          console.error('Erro ao salvar notícia:', err);
          alert('Erro ao salvar notícia: ' + (err.message || err));
        }
      }
    });

    function limparFormulario() {
      document.getElementById('id').value = '';
      document.getElementById('titulo').value = '';
      document.getElementById('descricao').value = '';
      document.getElementById('data').value = '';
      document.getElementById('imagem').value = '';
      document.getElementById('url_leiamais').value = '';
      // Resetar preview da imagem
      const preview = document.getElementById('preview');
      preview.src = '';
      preview.style.display = 'none';
      // Resetar input file
      document.getElementById('imagem_file').value = '';
      // Resetar estado de edição
      editandoId = null;
      document.getElementById('btnSubmit').textContent = 'Adicionar';
    }

    // Adicionar event listener para preview da imagem
    document.getElementById('imagem_file').addEventListener('change', function(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          // Mostrar preview
          const preview = document.getElementById('preview');
          preview.src = e.target.result;
          preview.style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    });

    function editar(id) {
      const n = NOTICIAS[id];
      if (!n) return alert('Notícia não encontrada');
      if (confirm("Deseja editar esta notícia?")) {
        editandoId = id;
        document.getElementById('id').value = n.id;
        document.getElementById('titulo').value = n.titulo;
        document.getElementById('descricao').value = n.descricao;
        document.getElementById('data').value = n.data ? new Date(n.data).toISOString().slice(0,10) : '';
        document.getElementById('imagem').value = n.imagem || '';
        document.getElementById('url_leiamais').value = n.url_leiamais || '';
        document.getElementById('btnSubmit').textContent = 'Atualizar';
        // Mostrar preview se houver imagem
        if (n.imagem) {
          const preview = document.getElementById('preview');
          preview.src = n.imagem;
          preview.style.display = 'block';
        }
        document.getElementById("formNoticias").scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    async function excluir(id) {
      if (!confirm('Confirma exclusão?')) return;
      try {
        const res = await fetch(`${API}/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
        });
        if (!res.ok) throw new Error('Erro ao excluir: ' + res.status);
        delete NOTICIAS[id];
        renderLista();
        alert('Notícia Excluída com sucesso');
      } catch (e) {
        console.error('Erro ao excluir:', e);
        alert('Erro ao excluir: ' + (e.message || e));
      }
    }

    // inicializa
    carregar();
    </script>
</body>
</html>
