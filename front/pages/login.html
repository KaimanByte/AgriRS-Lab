<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="/styles/StyleLogin.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgriRSlab</title>
</head>
<body>

<form class="form-login" id="loginForm">
    <div class="container">
        <div class="menu">
            <div class="menuSuperior">
               <img src="/imagens/Header/AgriRSlab.png" alt="AgriRS Lab">
               <h2 id="login">LOGIN</h2>
            </div>
            <div class="botao">
                <label for="usuario">USUÁRIO</label>
                <input 
                    type="text" 
                    id="usuario" 
                    name="usuario" 
                    required 
                    minlength="3"
                    autocomplete="username"
                >

                <label for="senha">SENHA</label>
                <input 
                    type="password" 
                    id="senha" 
                    name="senha" 
                    required 
                    minlength="6"
                    autocomplete="current-password"
                >
                
                <div id="mensagemErro" style="display: none; color: #ff4444; text-align: center;"></div>

                <button type="submit" id="btnEntrar">ENTRAR</button>
            </div>
        </div>
    </div>
</form>

<script>
const API_URL = 'http://localhost:3030';

// ==========================================
// FUNÇÕES AUXILIARES
// ==========================================
function mostrarErro(mensagem) {
    const msgErro = document.getElementById('mensagemErro');
    msgErro.textContent = mensagem;
    msgErro.style.display = 'block';
    
    setTimeout(() => {
        msgErro.style.display = 'none';
    }, 5000);
}

function setBotaoCarregando(carregando) {
    const btn = document.getElementById('btnEntrar');
    const usuario = document.getElementById('usuario');
    const senha = document.getElementById('senha');
    
    if (carregando) {
        btn.disabled = true;
        btn.textContent = 'ENTRANDO...';
        usuario.disabled = true;
        senha.disabled = true;
    } else {
        btn.disabled = false;
        btn.textContent = 'ENTRAR';
        usuario.disabled = false;
        senha.disabled = false;
    }
}

// ==========================================
// VERIFICAR ERROS DA URL (ADICIONE AQUI!)
// ==========================================
document.addEventListener('DOMContentLoaded', () => {
    // Verifica se há erro na URL
    const urlParams = new URLSearchParams(window.location.search);
    const erro = urlParams.get('erro');
    
    if (erro === 'sem_token') {
        mostrarErro('Você precisa fazer login para acessar essa página');
    } else if (erro === 'token_invalido') {
        mostrarErro('Sessão expirada. Faça login novamente');
    }
});

// ==========================================
// VERIFICAR SESSÃO EXISTENTE
// ==========================================
async function verificarSessao() {
    const token = localStorage.getItem('token');
    if (token) {
        try {
            const res = await fetch(`${API_URL}/auth/verificar`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (data.valido) {
                window.location.href = '/admin';
            } else {
                localStorage.removeItem('token');
                localStorage.removeItem('usuario');
            }
        } catch (error) {
            localStorage.removeItem('token');
            localStorage.removeItem('usuario');
        }
    }
}

verificarSessao();

// ==========================================
// HANDLER DO FORMULÁRIO
// ==========================================
document.getElementById('loginForm').addEventListener('submit', async function(event) {
    event.preventDefault();
    
    const usuario = document.getElementById('usuario').value.trim();
    const senha = document.getElementById('senha').value;

    if (usuario.length < 3) {
        mostrarErro('Usuário deve ter no mínimo 3 caracteres');
        return;
    }

    if (senha.length < 6) {
        mostrarErro('Senha deve ter no mínimo 6 caracteres');
        return;
    }

    setBotaoCarregando(true);

    try {
        const response = await fetch(`${API_URL}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ login: usuario, senha: senha })
        });

        const data = await response.json();

        if (response.ok) {
            localStorage.setItem('token', data.token);
            if (data.login) {
                localStorage.setItem('usuario', data.login);
            }
            window.location.href = '/admin';
        } else {
            mostrarErro(data.message || 'Usuário ou senha incorretos!');
        }
    } catch (error) {
        console.error('Erro:', error);
        mostrarErro('Erro ao conectar com o servidor. Tente novamente.');
    } finally {
        setBotaoCarregando(false);
    }
});

// ==========================================
// LIMPAR MENSAGEM AO DIGITAR
// ==========================================
document.getElementById('usuario').addEventListener('input', () => {
    document.getElementById('mensagemErro').style.display = 'none';
});

document.getElementById('senha').addEventListener('input', () => {
    document.getElementById('mensagemErro').style.display = 'none';
});
</script>

</body>
</html>
